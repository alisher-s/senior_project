services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: 8080

      # For production you must override secrets via your secret manager.
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
      POSTGRES_SSLMODE: disable

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      RATE_LIMIT_REQUESTS: 120
      RATE_LIMIT_WINDOW_SECONDS: 60

      AUTH_NU_EMAIL_DOMAIN: nu.edu.kz
      AUTH_BCRYPT_COST: 12
      PAYMENTS_WEBHOOK_SECRET: dev_payments_webhook_secret_change_me

      # Notifications SMTP: set in shell or repo-root `.env` (gitignored). See `.env.example`.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # MinIO / S3-compatible object storage for event cover images.
      # NOTE: MINIO_ENDPOINT must be reachable from inside the `api` container.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-event-assets}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      # Public URL must be reachable by your clients (browser / mobile).
      # For Android Emulator use: http://10.0.2.2:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
      # Secondary mapping for host `go test` when another Postgres already owns :5432.
      - "5433:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema: only docker/postgres/migrations/*.sql (lexicographic order). Runs once per new volume.
      - ./docker/postgres/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

