name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/app?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run DB migrations (DATABASE_URL_TEST)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}
        run: bash scripts/migrate.sh up

      - name: Migrate check (not dirty, no pending migrations)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}
        run: bash scripts/migrate.sh check

      - name: Go test
        env:
          APP_ENV: development
          DATABASE_URL_TEST: ${{ env.DATABASE_URL_TEST }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
          POSTGRES_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          JWT_ACCESS_SECRET: ci_access_secret
          JWT_REFRESH_SECRET: ci_refresh_secret
          PAYMENTS_WEBHOOK_SECRET: ci_webhook_secret
        run: go test ./... -race -count=1
