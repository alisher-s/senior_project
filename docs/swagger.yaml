      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Filter starts_after (RFC3339)
        in: query
        name: starts_after
        type: string
      - description: Filter starts_before (RFC3339)
        in: query
        name: starts_before
        type: string
      - description: 'Admin only: filter by organizer ID (UUID)'
