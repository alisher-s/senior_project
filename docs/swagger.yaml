basePath: /api/v1
definitions:
  app.HealthzResponse:
    properties:
      status:
        type: string
    type: object
  handler.AdminEventDTO:
    properties:
      id:
        type: string
      moderation_status:
        type: string
      organizer_id:
        type: string
      starts_at:
        type: string
      title:
        type: string
    type: object
  handler.AdminListEventsResponseDTO:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.AdminEventDTO'
        type: array
      limit:
        type: integer
      offset:
        type: integer
    type: object
  handler.AdminListUsersResponseDTO:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.AdminUserDTO'
        type: array
      limit:
        type: integer
      offset:
        type: integer
    type: object
  handler.AdminUserDTO:
    properties:
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  handler.AuthResponseDTO:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/handler.UserDTO'
    type: object
  handler.CancelTicketResponseDTO:
    properties:
      event_id:
        type: string
      status:
        type: string
      ticket_id:
        type: string
      user_id:
        type: string
    type: object
  handler.CreateEventRequestDTO:
    properties:
      capacity_total:
        maximum: 100000
        minimum: 1
        type: integer
      cover_image_url:
        maxLength: 2048
        type: string
      description:
        maxLength: 2000
        type: string
      end_at:
        example: "2026-01-01T12:00:00Z"
        type: string
      location:
        maxLength: 512
        type: string
      starts_at:
        description: RFC3339 / RFC3339Nano
        example: "2026-01-01T10:00:00Z"
        type: string
      title:
        maxLength: 120
        minLength: 3
        type: string
    required:
    - capacity_total
    - starts_at
    - title
    type: object
  handler.EventDTO:
    properties:
      capacity_available:
        type: integer
      capacity_total:
        type: integer
      cover_image_url:
        type: string
      description:
        type: string
      end_at:
        type: string
      id:
        type: string
      location:
        type: string
      moderation_status:
        type: string
      starts_at:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  handler.EventStatsResponseDTO:
    properties:
      as_of:
        type: string
      event_id:
        type: string
      registered_count:
        type: integer
      registration_timeline:
        items:
          $ref: '#/definitions/model.RegistrationHour'
        type: array
      remaining_capacity:
        type: integer
      total_capacity:
        type: integer
    type: object
  handler.InitiatePaymentRequestDTO:
    properties:
      amount:
        type: integer
      currency:
        maxLength: 3
        minLength: 3
        type: string
      event_id:
        type: string
    required:
    - amount
    - currency
    - event_id
    type: object
  handler.InitiatePaymentResponseDTO:
    properties:
      payment_id:
        type: string
      provider_ref:
        type: string
      provider_url:
        type: string
    type: object
  handler.ListEventsResponseDTO:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.EventDTO'
        type: array
      limit:
        type: integer
      offset:
        type: integer
    type: object
  handler.LoginRequestDTO:
    properties:
      email:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  handler.MeRolesResponseDTO:
    properties:
      user:
        $ref: '#/definitions/handler.UserDTO'
    type: object
  handler.ModerateEventRequestDTO:
    properties:
      action:
        enum:
        - approve
        - reject
        type: string
      reason:
        maxLength: 2000
        type: string
    required:
    - action
    type: object
  handler.ModerateEventResponseDTO:
    properties:
      moderation_status:
        type: string
    type: object
  handler.ModerationLogEntryDTO:
    properties:
      action:
        type: string
      admin_user_id:
        type: string
      created_at:
        type: string
      event_id:
        type: string
      id:
        type: string
      reason:
        type: string
    type: object
  handler.ModerationLogsResponseDTO:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.ModerationLogEntryDTO'
        type: array
      limit:
        type: integer
      offset:
        type: integer
    type: object
  handler.MyTicketItemDTO:
    properties:
      event_date:
        description: EventDate is the event start time (RFC3339).
        example: "2026-01-01T10:00:00Z"
        type: string
      event_id:
        type: string
      event_title:
        type: string
      qr_hash_hex:
        type: string
      status:
        description: Status is active, used, cancelled, or expired (expired is computed
          when the event has ended; not stored in DB).
        enum:
        - active
        - used
        - cancelled
        - expired
        type: string
      ticket_id:
        type: string
    type: object
  handler.MyTicketsResponseDTO:
    properties:
      tickets:
        items:
          $ref: '#/definitions/handler.MyTicketItemDTO'
        type: array
    type: object
  handler.PatchMeRolesRequestDTO:
    properties:
      roles:
        items:
          type: string
        maxItems: 8
        minItems: 1
        type: array
    required:
    - roles
    type: object
  handler.PaymentWebhookRequestDTO:
    properties:
      provider_ref:
        type: string
      status:
        type: string
    required:
    - provider_ref
    - status
    type: object
  handler.RefreshRequestDTO:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.RegisterRequestDTO:
    properties:
      email:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  handler.RegisterTicketRequestDTO:
    properties:
      event_id:
        type: string
    required:
    - event_id
    type: object
  handler.RegisterTicketResponseDTO:
    properties:
      event_id:
        type: string
      qr_hash_hex:
        description: QRHashHex is the check-in digest sent to POST /tickets/use.
        example: a1b2c3d4e5f6789012345678901234567890abcd
        type: string
      qr_png_base64:
        description: 'QRPNGBase64 is raw PNG bytes encoded as standard Base64 (no
          data: URL prefix).'
        example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==
        type: string
      status:
        type: string
      ticket_id:
        type: string
      user_id:
        type: string
    type: object
  handler.SendEmailRequestDTO:
    properties:
      body:
        maxLength: 5000
        minLength: 1
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
      to:
        type: string
    required:
    - body
    - title
    - to
    type: object
  handler.SetUserRoleRequestDTO:
    properties:
      role:
        enum:
        - student
        - organizer
        - admin
        type: string
    required:
    - role
    type: object
  handler.UpdateEventRequestDTO:
    properties:
      capacity_total:
        maximum: 100000
        minimum: 1
        type: integer
      cover_image_url:
        maxLength: 2048
        type: string
      description:
        maxLength: 2000
        type: string
      end_at:
        example: "2026-01-01T12:00:00Z"
        type: string
      location:
        maxLength: 512
        type: string
      starts_at:
        example: "2026-01-01T10:00:00Z"
        type: string
      status:
        enum:
        - draft
        - published
        - cancelled
        type: string
      title:
        maxLength: 120
        minLength: 3
        type: string
    type: object
  handler.UseTicketRequestDTO:
    properties:
      qr_hash_hex:
        type: string
    required:
    - qr_hash_hex
    type: object
  handler.UseTicketResponseDTO:
    properties:
      event_id:
        type: string
      status:
        type: string
      ticket_id:
        type: string
      user_id:
        type: string
    type: object
  handler.UserDTO:
    properties:
      email:
        type: string
      id:
        type: string
      pending_roles:
        items:
          type: string
        type: array
      role:
        type: string
      roles:
        items:
          type: string
        type: array
    type: object
  handler.UserRoleResponseDTO:
    properties:
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  httpx.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  httpx.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/httpx.APIError'
    type: object
  model.RegistrationHour:
    properties:
      count:
        type: integer
      hour:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    Modular monolith backend (Go + Chi). HTTP handlers live in domain packages (`auth/handler`, `events/handler`, `ticketing/handler`, …) under `internal/app` at base path **`/api/v1`** (отдельного пакета `internal/api/v1` в репозитории нет).
    **Ошибки:** тело `{ "error": { "code": "string", "message": "string" } }`. Типичные HTTP-коды: **401 Unauthorized** — нет/невалидный JWT (`missing_authorization`, `invalid_token`, `invalid_credentials`, …); **403 Forbidden** — RBAC (`forbidden`, `organizer_request_forbidden`, …); **409 Conflict** — билеты и бизнес-правила (`already_registered`, `capacity_full`, `event_not_approved`, …). Полный список `error.code` — в README.
    Даты событий: **RFC3339**, например `2026-01-01T10:00:00Z`. Ответ `POST /tickets/register`: поля **`qr_hash_hex`** и **`qr_png_base64`**.
  title: Student Event Ticketing Platform API
  version: "0.1"
paths:
  /admin/events:
    get:
      description: Returns events for admin tooling. Default moderation_status is
        `pending` when omitted.
      parameters:
      - description: Bearer access token (admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: 'Filter by moderation status: pending|approved|rejected (default
          pending)'
        in: query
        name: moderation_status
        type: string
      - description: Search by title (substring match)
        in: query
        name: q
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AdminListEventsResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: List events for admin moderation and browsing (admin only)
      tags:
      - admin
  /admin/events/{id}/moderate:
    post:
      consumes:
      - application/json
      description: '**401** / **403** — same as other admin routes (JWT + admin role).'
      parameters:
      - description: Bearer access token (admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Event ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: approve or reject
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ModerateEventRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ModerateEventResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Moderate event visibility (admin only)
      tags:
      - admin
  /admin/moderation-logs:
    get:
      description: '**401** / **403** — JWT + **admin** only.'
      parameters:
      - description: Bearer access token (admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by event UUID
        in: query
        name: event_id
        type: string
      - description: Filter by acting admin user UUID
        in: query
        name: admin_id
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ModerationLogsResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: List moderation audit logs (admin only)
      tags:
      - admin
  /admin/users:
    get:
      description: Returns basic user info for admin user management. Search is a
        substring match on email.
      parameters:
      - description: Bearer access token (admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Search by email (substring match)
        in: query
        name: q
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AdminListUsersResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: List/search users by email (admin only)
      tags:
      - admin
  /admin/users/{id}/role:
    patch:
      consumes:
      - application/json
      description: '**401** — missing/invalid JWT; **403** — `forbidden` if caller
        is not **admin**.'
      parameters:
      - description: Bearer access token (admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: New role
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SetUserRoleRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserRoleResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Set user role (admin only)
      tags:
      - admin
  /analytics/events/stats:
    get:
      consumes:
      - application/json
      description: Registration and capacity metrics for an event or aggregated for
        the caller. **Requires organizer or admin** (students get **403 forbidden**).
        Organizers see only their events; admins see any event or global aggregates.
      parameters:
      - description: Bearer access token (organizer or admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by event UUID; omit to aggregate events in scope
        in: query
        name: event_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.EventStatsResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Event statistics
      tags:
      - analytics
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: invalid_credentials
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Login and get tokens
      tags:
      - auth
  /auth/me/roles:
    patch:
      consumes:
      - application/json
      description: 'Student-only flow: body must be exactly `{"roles":["organizer"]}`.
        **401** — missing/invalid JWT (same codes as middleware). **403** — `organizer_request_forbidden`
        if caller is not an active student. **409** — `organizer_already_active` if
        organizer is already granted.'
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: e.g. {\
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.PatchMeRolesRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MeRolesResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: missing_authorization, invalid_token, invalid_token_claims,
            …
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: organizer_request_forbidden (RBAC / business rule)
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "409":
          description: organizer_already_active
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Request organizer role (pending until admin approves)
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: invalid_refresh_token, refresh_token_consumed
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Refresh access token using refresh token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.AuthResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "409":
          description: 'email already registered (code: email_exists)'
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /events:
    get:
      consumes:
      - application/json
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Page size (default 20 if omitted or invalid; max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Filter starts_after (RFC3339)
        in: query
        name: starts_after
        type: string
      - description: Filter starts_before (RFC3339)
        in: query
        name: starts_before
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ListEventsResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
      summary: List events
      tags:
      - events
    post:
      consumes:
      - application/json
      description: 'Creates an event for the authenticated organizer or admin. New
        events start with moderation_status pending until an admin approves. Optional
        fields: location, end_at (must be after starts_at).'
      parameters:
      - description: Bearer access token (organizer or admin)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Create event request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateEventRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.EventDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "401":
          description: 'Missing/invalid JWT (see code: missing_authorization, invalid_token,
            …)'
          schema:
            $ref: '#/definitions/httpx.ErrorResponse'
        "403":
          description: 'Authenticated but not organizer/admin (code: forbidden)'
          schema:
